name: Majsoul-Login
on:
  workflow_dispatch:
  schedule:  # 8:00 北京时间
    - cron: '0 0 * * *'
jobs:
  login:
    name: Majsoul-Login
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Selenium
        run: pip install selenium==4.17.2

      - name: Majsoul login
        run: |
          python login.py \
            ${{ secrets.EMAIL }} \
            ${{ secrets.PASSWD }} \
            ${{ secrets.SMTP_SERVER }} \
            ${{ secrets.SMTP_PORT }} \
            ${{ secrets.SENDER_EMAIL }} \
            ${{ secrets.SENDER_PASS }} \
            ${{ secrets.RECIPIENT_EMAIL }}
